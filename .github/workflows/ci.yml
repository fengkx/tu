name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview
          rustup default stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare Python virtualenv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install tiktoken

      - name: Run tests with coverage
        env:
          CARGO_TERM_COLOR: never
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --all-features --html --output-dir target/llvm-cov/html | tee coverage-summary.txt

      - name: Export lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Publish coverage summary
        run: |
          {
            echo "## Coverage"
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html
